<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flores amarillas para Akemi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="flowers-page">
  <main class="garden">
    <header class="garden-header">
      <h1>Para Akemi</h1>
      <p>Un campo de flores amarillas para celebrar tu dia.</p>
    </header>

    <section class="flower-scene" aria-label="Campo de girasoles al atardecer">
      <div class="sun"></div>
      <div class="haze"></div>
      <div class="distant-field"></div>

      <article class="hero-flower hero-left">
        <div class="stem"></div>
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
        <div class="bloom">
          <div class="petals" aria-hidden="true">
            <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span>
            <span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
            <span class="petal p9"></span><span class="petal p10"></span><span class="petal p11"></span><span class="petal p12"></span>
            <span class="petal p13"></span><span class="petal p14"></span><span class="petal p15"></span><span class="petal p16"></span>
          </div>
          <div class="disk"></div>
        </div>
      </article>

      <article class="hero-flower hero-right">
        <div class="stem"></div>
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
        <div class="bloom">
          <div class="petals" aria-hidden="true">
            <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span>
            <span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
            <span class="petal p9"></span><span class="petal p10"></span><span class="petal p11"></span><span class="petal p12"></span>
            <span class="petal p13"></span><span class="petal p14"></span><span class="petal p15"></span><span class="petal p16"></span>
          </div>
          <div class="disk"></div>
        </div>
      </article>
    </section>

    <a class="back-link" href="index.html">Volver a la carta</a>
  </main>
</body>
</html>
